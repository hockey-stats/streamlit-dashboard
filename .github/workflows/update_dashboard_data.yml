name: Update Data for Free Agency Dashboard
on:
  workflow_dispatch:
  push:
    branches:
     - 'main'
  schedule: 
    - cron: 0 7 * * *

env:
  DATA_ARTIFACT_NAME: 'dashboard-fa-data'

jobs:
  get-data:
    runs-on: ubuntu-latest
    container:
      image: sohraub/chart-plotter:main
    ###
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      #
      - name: Create oauth.json
        env:
          OAUTH_JSON: ${{ secrets.YAHOO_OAUTH_JSON }}
        run: echo "$OAUTH_JSON" > oauth.json
      #
      - name: Gather Data
        env: 
          PYTHONPATH: ${{ github.workspace }}
        run: python3 get_free_agent_summary.py
      #
      - name: Save Output as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DATA_ARTIFACT_NAME }}
          path: ./*.csv
          retention-days: 2
          overwrite: true
    ###
